<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z - Gestión Fiscal Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --p: #2c3e50; --s: #27ae60; --d: #e74c3c; --a: #2980b9; }
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; color: var(--p); }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav { background: var(--p); padding: 15px; border-radius: 8px; color: white; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        select, button, input { padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
        button { cursor: pointer; background: #34495e; color: white; border: none; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 8px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .res-grid { display: none; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 20px; }
        .stat { padding: 10px; border-radius: 5px; color: white; text-align: center; font-size: 0.9em; font-weight: bold; }
        .target-box { display: none; background: #fff3cd; padding: 20px; margin-top: 20px; border-radius: 10px; text-align: center; border: 1px solid #ffeeba; color: #856404; }
    </style>
</head>
<body>

<div class="container">
    <h2>Z - Contabilidad Cloud</h2>
    <div class="nav">
        Año: <select id="selAno" onchange="cambiarAno()"></select>
        <button onclick="crearAno()">+ Nuevo Año</button>
        Trim: <select id="selTrim" onchange="cambiarTrimestre()"></select>
        <button onclick="crearTrimestre()">+ Nuevo Trimestre</button>
    </div>

    <div id="workspace" style="display:none">
        <div class="grid">
            <div class="card" style="border-left: 5px solid var(--s)">
                <h3>📈 Ingreso</h3>
                <input type="number" id="iTotal" placeholder="Total con IVA" style="width: 100%; box-sizing: border-box;">
                <button style="background:var(--s); width: 100%; margin-top: 10px;" onclick="add('ingreso')">Añadir Venta</button>
            </div>
            <div class="card" style="border-left: 5px solid var(--d)">
                <h3>📉 Gasto</h3>
                <select id="gTipo" style="width: 100%; margin-bottom: 10px;">
                    <option value="Normal">📄 Gasto con IVA (21%)</option>
                    <option value="Intracom/Oro">🌍 Intracom / Oro / Plata (0% IVA)</option>
                    <option value="Retención">✂️ Retención Prof. (15%)</option>
                    <option value="Inversión">🏭 Bien de Inversión</option>
                </select>
                <input type="number" id="gTotal" placeholder="Total Factura" style="width: 100%; box-sizing: border-box;">
                <button style="background:var(--d); width: 100%; margin-top: 10px;" onclick="add('gasto')">Añadir Gasto</button>
            </div>
        </div>

        <table id="tabla">
            <thead><tr><th>Concepto</th><th>Base</th><th>IVA</th><th>Total</th><th></th></tr></thead>
            <tbody></tbody>
        </table>

        <button style="width:100%; padding:15px; background:var(--a); margin-top:20px;" onclick="calcular()">📊 Calcular Impuestos Actuales</button>

        <div class="res-grid" id="panelRes">
            <div class="stat" style="background:#2980b9">IVA:<br><span id="rIva">0</span>€</div>
            <div class="stat" style="background:#27ae60">Neto:<br><span id="rNeto">0</span>€</div>
            <div class="stat" style="background:#f39c12">IRPF (20%):<br><span id="rIrpf">0</span>€</div>
            <div class="stat" style="background:#7f8c8d">Ret.:<br><span id="rRet">0</span>€</div>
        </div>

        <div class="target-box" id="panelObj">
            <p>Para no superar los 1000€ de IRPF necesitas gastar (en Base):</p>
            <strong id="rObj" style="font-size: 1.6em;">0.00 €</strong>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyACRZQ98qPHsFOfVj-x1AvxN1dDfQ4MHgS",
        authDomain: "trimestres-zayro.firebaseapp.com",
        projectId: "trimestres-zayro",
        storageBucket: "trimestres-zayro.firebasestorage.app",
        messagingSenderId: "1020114221016",
        appId: "1:1020114221016:web:08e78a8dd4a448296da4ad"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let anoActivo = null, trimActivo = null, items = [];

    function cargarAnos() {
        db.collection("data").get().then(snap => {
            const s = document.getElementById('selAno');
            s.innerHTML = '<option value="">-- Selecciona --</option>';
            snap.forEach(doc => s.innerHTML += `<option value="${doc.id}">${doc.id}</option>`);
        });
    }

    function crearAno() {
        let a = prompt("Año (ej: 2026):");
        if(!a) return;
        db.collection("data").doc(a).set({creado: true}).then(() => { alert("✅ Año creado"); cargarAnos(); });
    }

    function cambiarAno() {
        anoActivo = document.getElementById('selAno').value;
        if(!anoActivo) return;
        db.collection("data").doc(anoActivo).collection("trimestres").get().then(snap => {
            const s = document.getElementById('selTrim');
            s.innerHTML = '<option value="">-- Selecciona --</option>';
            snap.forEach(doc => s.innerHTML += `<option value="${doc.id}">${doc.id}</option>`);
        });
        document.getElementById('workspace').style.display = 'none';
    }

    function crearTrimestre() {
        if(!anoActivo) return alert("Selecciona año primero");
        let t = prompt("Trimestre (ej: T1):");
        if(t) db.collection("data").doc(anoActivo).collection("trimestres").doc(t).set({items: []}).then(cambiarAno);
    }

    function cambiarTrimestre() {
        trimActivo = document.getElementById('selTrim').value;
        if(!trimActivo) return;
        document.getElementById('workspace').style.display = 'block';
        db.collection("data").doc(anoActivo).collection("trimestres").doc(trimActivo)
          .onSnapshot(doc => { items = doc.data()?.items || []; render(); });
    }

    function add(tipo) {
        let val = parseFloat(tipo === 'ingreso' ? document.getElementById('iTotal').value : document.getElementById('gTotal').value);
        if(!val) return;
        let cat = tipo === 'gasto' ? document.getElementById('gTipo').value : 'Venta';
        let r = { tipo, cat, total: val, base: 0, iva: 0, ret: 0 };

        if(tipo === 'ingreso') { r.base = val/1.21; r.iva = val-r.base; }
        else {
            if(cat === 'Normal' || cat === 'Inversión') { r.base = val/1.21; r.iva = val-r.base; }
            else if(cat === 'Retención') { r.base = val/1.06; r.iva = r.base*0.21; r.ret = r.base*0.15; }
            else { r.base = val; r.iva = 0; }
        }

        items.push(r);
        db.collection("data").doc(anoActivo).collection("trimestres").doc(trimActivo).update({ items });
        document.getElementById('iTotal').value = ''; document.getElementById('gTotal').value = '';
    }

    function render() {
        const b = document.querySelector('#tabla tbody'); b.innerHTML = '';
        items.forEach((r, i) => {
            b.innerHTML += `<tr><td>${r.cat}</td><td>${r.base.toFixed(2)}€</td><td>${r.iva.toFixed(2)}€</td><td>${r.total.toFixed(2)}€</td><td onclick="borrar(${i})" style="cursor:pointer">❌</td></tr>`;
        });
    }

    function borrar(i) {
        items.splice(i, 1);
        db.collection("data").doc(anoActivo).collection("trimestres").doc(trimActivo).update({ items });
    }

    function calcular() {
        let ivaD = 0, ivaS = 0, bI = 0, bG = 0, ret = 0;
        items.forEach(r => {
            if(r.tipo === 'ingreso') { ivaD += r.iva; bI += r.base; }
            else { ivaS += r.iva; ret += r.ret; if(r.cat !== 'Inversión') bG += r.base; }
        });
        document.getElementById('rIva').innerText = (ivaD - ivaS).toFixed(2);
        document.getElementById('rNeto').innerText = (bI - bG).toFixed(2);
        document.getElementById('rIrpf').innerText = ((bI - bG) * 0.20).toFixed(2);
        document.getElementById('rRet').innerText = ret.toFixed(2);
        
        let baseParaMil = bI - 5000;
        let faltaGastar = baseParaMil - bG;
        document.getElementById('rObj').innerText = (faltaGastar > 0 ? faltaGastar : 0).toFixed(2) + ' €';

        document.getElementById('panelRes').style.display = 'grid';
        document.getElementById('panelObj').style.display = 'block';
    }

    cargarAnos();
</script>
</body>
</html>
